services:

  # ── .NET 10 Backend API ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth0-multitenant-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Auth0
      - Auth0__Domain=${AUTH0_DOMAIN}
      - Auth0__Audience=${AUTH0_AUDIENCE}
      - Auth0__M2MClientId=${AUTH0_M2M_CLIENT_ID}
      - Auth0__M2MClientSecret=${AUTH0_M2M_CLIENT_SECRET}
      - Auth0__AppClientId=${AUTH0_APP_CLIENT_ID}
      - Auth0__AdminRoleId=${AUTH0_ADMIN_ROLE_ID}
      - Auth0__MemberRoleId=${AUTH0_MEMBER_ROLE_ID}
      - Auth0__Connection=${AUTH0_CONNECTION:-Username-Password-Authentication}
      # App
      - App__FrontendUrl=${FRONTEND_URL:-http://localhost:5173}
      # SMTP (optional)
      - Smtp__Server=${SMTP_SERVER:-localhost}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL:-noreply@example.com}
      - Smtp__FromName=${SMTP_FROM_NAME:-Multi-Tenant SaaS}
      - Smtp__UseTls=${SMTP_USE_TLS:-true}
      # Microsoft OAuth (if backend needs to validate tokens)
      - MicrosoftOAuth__ClientSecret=${MICROSOFT_CLIENT_SECRET:-}
      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ── Vue 3 Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time variables baked into the Vite bundle
        - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${AUTH0_APP_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
        - VITE_NOTES_REDIRECT_URI=http://localhost:5175/callback
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
        # Google OAuth
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        # Microsoft OAuth
        - VITE_MICROSOFT_CLIENT_ID=${VITE_MICROSOFT_CLIENT_ID}
        - VITE_MICROSOFT_TENANT_ID=${VITE_MICROSOFT_TENANT_ID}
    container_name: auth0-multitenant-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

# ── CRM App (Vue 3 + Auth0 SPA SDK) ────────────────────────────────────────────────
  # PoC test application demonstrating SSO across multiple Vue 3 apps
  # Runs on port 5174
  crm-app:
    build:
      context: ./crm-app
      dockerfile: Dockerfile
      args:
        # Build-time variables baked into the Vite bundle
        - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
        - VITE_CRM_CLIENT_ID=${VITE_CRM_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
        - VITE_CRM_REDIRECT_URI=http://localhost:5174/callback
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: auth0-crm-app
    restart: unless-stopped
    ports:
      - "5174:80"  # Use port 5174 for CRM app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ── Notes App (React + @auth0/auth0-react) ───────────────────────────────────────────
  # PoC test application demonstrating SSO across React and Vue apps
  # Runs on port 5174
  notes-app:
    build:
      context: ./notes-app
      dockerfile: Dockerfile
      args:
        # Build-time variables baked into the Vite bundle
        - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
        - VITE_NOTES_CLIENT_ID=${VITE_NOTES_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
        - VITE_NOTES_REDIRECT_URI=http://localhost:5175/callback
    container_name: auth0-notes-app
    restart: unless-stopped
    ports:
      - "5175:80"  # Use port 5175 for Notes app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ── Custom Nginx Proxy (Optional) ────────────────────────────────────────────────
  # Uncomment and configure to test SSO with clean URLs:
  # nginx:
  #   image: nginx:alpine
  #   container_name: auth0-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - crm-app
  #     - notes-app
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
